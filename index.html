<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>мҲңм°ҪмҙҲ м Җл…ҒлҠҳлҙ„ кё°кҙҖ м§ҖлҸ„</title>
  <style>
    html,body{background:#f5f6fa;min-height:100%;margin:0;padding:0;}
    :root{--bg:#f5f6fa;--surface:#fff;--text:#2d3436;--text-sub:#636e72;--border:#e9ecef;--blue-deep:#0984e3;--green-deep:#00b894;--teal-deep:#00cec9;--orange-deep:#e17055;--red-deep:#d63031;--shadow:0 2px 12px rgba(0,0,0,0.06);--radius:14px;--radius-sm:10px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,'Malgun Gothic',sans-serif;color:var(--text);line-height:1.5;}
    .header{padding:14px 20px;text-align:center;font-size:1rem;font-weight:700;color:white;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#0984e3,#00cec9);position:sticky;top:0;z-index:50;}
    .header .title{flex-grow:1;text-align:center;}
    .btn-back{background:rgba(255,255,255,0.2);border:none;color:white;padding:8px 14px;border-radius:8px;font-weight:700;font-size:0.85rem;cursor:pointer;}
    .content{max-width:520px;margin:0 auto;padding:16px 20px;}
    .filter-bar{display:flex;gap:6px;margin-bottom:8px;justify-content:center;flex-wrap:wrap;}
    .filter-subbar{display:flex;gap:6px;margin-bottom:14px;justify-content:center;flex-wrap:wrap;}
    .btn-filter{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text-sub);font-weight:700;font-size:0.82rem;cursor:pointer;transition:0.15s;}
    .btn-filter.active{background:var(--teal-deep);color:white;border-color:var(--teal-deep);}
    .btn-filter.ghost.active{background:rgba(0,206,201,0.08);color:var(--teal-deep);border-color:rgba(0,206,201,0.35);}
    .map-wrap{width:100%;height:400px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:16px;box-shadow:var(--shadow);}
    .org-count{font-size:0.82rem;color:var(--text-sub);margin-bottom:10px;}
    .org-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:transform 0.1s;position:relative;overflow:hidden;}
    .org-card:active{transform:scale(0.98);}
    .org-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
    .org-card.school::before{background:var(--blue-deep);}
    .org-card.community::before{background:var(--green-deep);}
    .org-card.selected{border:2px solid var(--teal-deep);background:rgba(0,206,201,0.04);}
    .org-name{font-weight:800;font-size:0.92rem;margin-bottom:4px;padding-left:8px;}
    .org-info{font-size:0.78rem;color:var(--text-sub);line-height:1.7;padding-left:8px;}
    .org-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;padding-left:8px;}
    .badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:0.72rem;font-weight:700;}
    .badge-blue{background:rgba(9,132,227,0.1);color:var(--blue-deep);}
    .badge-green{background:rgba(0,184,148,0.1);color:var(--green-deep);}
    .badge-orange{background:rgba(225,112,85,0.1);color:var(--orange-deep);}
    .badge-red{background:rgba(214,48,49,0.1);color:var(--red-deep);}
    .badge-yellow{background:rgba(253,203,110,0.2);color:#e17055;}
    .loading{display:flex;justify-content:center;align-items:center;padding:40px;flex-direction:column;gap:12px;}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top:3px solid var(--teal-deep);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .load-text{font-size:0.88rem;color:var(--text-sub);font-weight:600;}
    .detail-panel{display:none;background:var(--surface);border:2px solid var(--teal-deep);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,0.1);position:relative;}
    .detail-panel.show{display:block;}
    .dp-close{position:absolute;top:12px;right:12px;background:var(--border);border:none;width:28px;height:28px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .dp-header{margin-bottom:12px;}
    .dp-name{font-size:1.1rem;font-weight:800;margin-bottom:4px;}
    .dp-type{font-size:0.82rem;color:var(--text-sub);}
    .dp-section{margin-bottom:14px;}
    .dp-section-title{font-size:0.82rem;font-weight:700;color:var(--teal-deep);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
    .dp-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 10px;font-size:0.85rem;line-height:1.7;}
    .dp-label{color:var(--text-sub);font-weight:600;}
    .dp-value{color:var(--text);}
    .dp-value.pending{color:var(--orange-deep);font-style:italic;}
    .dp-transport{padding:10px;border-radius:8px;font-size:0.85rem;margin-top:4px;}
    .dp-transport.yes{background:rgba(0,184,148,0.08);color:var(--green-deep);}
    .dp-transport.no{background:var(--bg);color:var(--text-sub);}
    .dp-progs{margin-top:8px;}
    .dp-prog{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;font-size:0.82rem;line-height:1.6;}
    .dp-prog-name{font-weight:700;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
    .dp-contact-btns{display:flex;gap:8px;margin-top:8px;}
    .btn-contact{flex:1;padding:10px;border:none;border-radius:8px;font-size:0.88rem;font-weight:700;cursor:pointer;text-align:center;}
    .btn-contact:active{opacity:0.8;}
    .btn-contact.call{background:linear-gradient(135deg,#0984e3,#74b9ff);color:white;}
    .btn-contact.sms{background:var(--bg);color:var(--text);border:1px solid var(--border);}
    .btn-route{display:block;text-align:center;padding:10px 12px;border-radius:10px;background:rgba(0,206,201,0.08);border:1px solid rgba(0,206,201,0.2);color:var(--teal-deep);font-weight:700;font-size:0.85rem;text-decoration:none;margin-top:10px;}
    .route-note{font-size:0.8rem;color:var(--text-sub);line-height:1.6;margin-top:8px;}
    .dp-empty{font-size:0.84rem;color:var(--text-sub);padding:10px 0;text-align:center;}
    .dp-summary{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 16px;}
    .dp-acc{margin-bottom:14px;}
    .dp-acc-head{width:100%;border:none;background:transparent;padding:10px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:0.88rem;font-weight:800;color:var(--text);cursor:pointer;text-align:left;}
    .dp-acc-body{display:none;padding-top:10px;}
    .dp-acc.open .dp-acc-body{display:block;}
    .dp-acc.open .dp-acc-arrow{transform:rotate(180deg);}
    .dp-acc-arrow{color:var(--text-sub);transition:transform 0.15s;}
    .notice-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;}
    .notice-title{font-size:0.85rem;font-weight:700;margin-bottom:4px;}
    .notice-date{font-size:0.75rem;color:var(--text-sub);margin-bottom:6px;}
    .notice-content{font-size:0.82rem;line-height:1.6;}
    .debug-bar{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px;margin-bottom:12px;font-size:0.78rem;color:#856404;display:none;}
  </style>
</head>
<body>
<div class="header">
  <button class="btn-back" onclick="window.close()">вҶҗ лҸҢм•„к°Җкё°</button>
  <div class="title">рҹ—әпёҸ мҲңм°ҪмҙҲ м Җл…ҒлҠҳлҙ„ кё°кҙҖ м§ҖлҸ„</div>
  <div style="width:70px;"></div>
</div>
<div class="content">
  <div class="debug-bar" id="debug-bar"></div>
  <div class="filter-bar" id="filter-bar"></div>
  <div class="filter-subbar" id="filter-subbar"></div>
  <div class="map-wrap" id="map-container">
    <div class="loading" id="map-loading"><div class="spinner"></div><div class="load-text">м§ҖлҸ„ л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</div></div>
  </div>
  <div class="detail-panel" id="detail-panel"></div>
  <div id="org-list"></div>
</div>

<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=292ea33281f52f28bb790bd726a77ffb&libraries=services"></script>
<script>
var GAS_URL='https://script.google.com/macros/s/AKfycbyTLRphhpEtXFRXbPGTEqFtp-MGCm0LDoiIWzRC_zc46ikzqDHgTEpUe-8sW1VmuDl_/exec';
var mapOrgs=[];
var kakaoMap=null;
var allMarkers=[];
var currentFilter='м „мІҙ';
var onlyOpen=false;
var onlyTransport=false;
var currentOpenInfo=null;
var selectedOrg=null;
var noticeCache={};

document.addEventListener('DOMContentLoaded',function(){
  renderFilters();
  loadMapData();
});

// вҳ… н•өмӢ¬ ліҖкІҪ: лӢЁмқј fetchлЎң кё°кҙҖ+н”„лЎңк·ёлһЁ лӘЁл‘җ лЎңл“ң
function loadMapData(){
  fetch(GAS_URL+'?action=getMapData')
    .then(function(r){return r.json();})
    .then(function(d){
      mapOrgs=d||[];
      // л””лІ„к·ё: н”„лЎңк·ёлһЁ м—°лҸҷ мғҒнғң нҷ•мқё
      var debugInfo=[];
      mapOrgs.forEach(function(o){
        var pCount=(o.programs||[]).length;
        if(pCount===0) debugInfo.push(o.name+': н”„лЎңк·ёлһЁ 0к°ң');
      });
      if(debugInfo.length>0){
        var db=document.getElementById('debug-bar');
        db.innerHTML='вҡ пёҸ н”„лЎңк·ёлһЁ лҜём—°лҸҷ кё°кҙҖ: '+debugInfo.join(', ')+'<br><small>кё°кҙҖм •ліҙ мӢңнҠёмҷҖ н”„лЎңк·ёлһЁ мӢңнҠёмқҳ кё°кҙҖлӘ…мқҙ м •нҷ•нһҲ мқјм№ҳн•ҳлҠ”м§Җ нҷ•мқён•ҳм„ёмҡ”.</small>';
        db.style.display='block';
      }
      initMap();
      renderOrgList();
    })
    .catch(function(e){
      document.getElementById('map-loading').innerHTML='<div style="color:#d63031;font-weight:700;">лҚ°мқҙн„° лЎңл“ң мӢӨнҢЁ: '+e.message+'</div>';
    });
}

// ==========================================
// н•„н„°
// ==========================================
function renderFilters(){
  var fs=[{v:'м „мІҙ',l:'м „мІҙ'},{v:'н•ҷкөҗл°– лҠҳлҙ„',l:'рҹ“ҡ н•ҷкөҗл°– лҠҳлҙ„'},{v:'м§Җм—ӯмӮ¬нҡҢ лҸҢлҙ„',l:'рҹҸ  м§Җм—ӯмӮ¬нҡҢ лҸҢлҙ„'}];
  var h='';
  fs.forEach(function(f){
    h+='<button class="btn-filter'+(currentFilter===f.v?' active':'')+'" onclick="setFilter(\''+f.v+'\')">'+f.l+'</button>';
  });
  document.getElementById('filter-bar').innerHTML=h;
  renderSubFilters();
}

function renderSubFilters(){
  var h='';
  h+='<button class="btn-filter ghost'+(onlyOpen?' active':'')+'" onclick="toggleOpenOnly()">рҹҹў лӘЁм§‘мӨ‘л§Ң</button>';
  h+='<button class="btn-filter ghost'+(onlyTransport?' active':'')+'" onclick="toggleTransportOnly()">рҹҡҢ нҶөн•ҷлІ„мҠӨ</button>';
  document.getElementById('filter-subbar').innerHTML=h;
}

function setFilter(f){
  currentFilter=f;renderFilters();closeDetail();clearMarkers();placeMarkers();renderOrgList();
}
function toggleOpenOnly(){
  onlyOpen=!onlyOpen;renderFilters();closeDetail();clearMarkers();placeMarkers();renderOrgList();
}
function toggleTransportOnly(){
  onlyTransport=!onlyTransport;renderFilters();closeDetail();clearMarkers();placeMarkers();renderOrgList();
}

function getFiltered(){
  return mapOrgs.filter(function(o){
    if(currentFilter!=='м „мІҙ'&&String(o.type||'').trim()!==currentFilter) return false;
    if(onlyOpen&&(parseInt(o.openCount,10)||0)<=0) return false;
    if(onlyTransport&&String(o.transport||'').trim()!=='мһҲмқҢ') return false;
    return true;
  });
}

// ==========================================
// м№ҙм№ҙмҳӨл§ө
// ==========================================
function initMap(){
  document.getElementById('map-loading').style.display='none';
  var center=new kakao.maps.LatLng(35.3741,127.1373);
  kakaoMap=new kakao.maps.Map(document.getElementById('map-container'),{center:center,level:5});

  var sm=new kakao.maps.Marker({position:center,map:kakaoMap});
  var si=new kakao.maps.InfoWindow({content:'<div style="padding:8px 14px;font-size:0.85rem;font-weight:700;white-space:nowrap;">рҹҸ« мҲңм°ҪмҙҲл“ұн•ҷкөҗ</div>'});
  si.open(kakaoMap,sm);

  kakao.maps.event.addListener(kakaoMap,'click',function(){closeAllInfo();});
  placeMarkers();
}

function clearMarkers(){
  allMarkers.forEach(function(m){m.info.close();m.marker.setMap(null);});
  allMarkers=[];currentOpenInfo=null;
}

function closeAllInfo(){
  allMarkers.forEach(function(m){m.info.close();});
  currentOpenInfo=null;
}

function placeMarkers(){
  var gc=new kakao.maps.services.Geocoder();
  var filtered=getFiltered();

  filtered.forEach(function(org){
    if(!org.address)return;
    gc.addressSearch(org.address,function(res,st){
      if(st===kakao.maps.services.Status.OK){
        var pos=new kakao.maps.LatLng(res[0].y,res[0].x);
        var isSchool=String(org.type||'').trim()==='н•ҷкөҗл°– лҠҳлҙ„';
        var color=isSchool?'#0984e3':'#00b894';

        var svg='<svg xmlns="http://www.w3.org/2000/svg" width="30" height="42" viewBox="0 0 30 42"><path d="M15 0C6.7 0 0 6.7 0 15c0 11.3 15 27 15 27s15-15.7 15-27C30 6.7 23.3 0 15 0z" fill="'+color+'"/><circle cx="15" cy="15" r="8" fill="white"/></svg>';
        var mi=new kakao.maps.MarkerImage('data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg),new kakao.maps.Size(30,42));
        var marker=new kakao.maps.Marker({position:pos,map:kakaoMap,image:mi});

        var icon=isSchool?'рҹ“ҡ':'рҹҸ ';
        var tl=isSchool?'н•ҷкөҗл°– лҠҳлҙ„':'м§Җм—ӯмӮ¬нҡҢ лҸҢлҙ„';
        var pCount=(org.programs||[]).length;

        var iwContent='<div style="padding:8px 12px;font-size:0.82rem;line-height:1.5;white-space:nowrap;">'+
          '<div style="font-weight:800;">'+icon+' '+esc(org.name)+'</div>'+
          '<div style="color:#636e72;font-size:0.78rem;">'+tl+' В· н”„лЎңк·ёлһЁ '+pCount+'к°ң</div>'+
          (org.openCount>0?'<div style="color:#00b894;font-weight:700;font-size:0.78rem;">рҹҹў лӘЁм§‘мӨ‘ '+org.openCount+'к°ң</div>':'')+
          '</div>';

        var iw=new kakao.maps.InfoWindow({content:iwContent});

        kakao.maps.event.addListener(marker,'click',function(){
          if(currentOpenInfo===iw){iw.close();currentOpenInfo=null;return;}
          closeAllInfo();
          iw.open(kakaoMap,marker);
          currentOpenInfo=iw;
          showDetail(org.name);
        });

        allMarkers.push({marker:marker,info:iw,org:org});
      }
    });
  });
}

// ==========================================
// мғҒм„ё нҢЁл„җ
// ==========================================
function buildAccordion(id,title,bodyHtml,isOpen){
  return '<div class="dp-acc'+(isOpen?' open':'')+'" id="dp-acc-'+id+'">'
    +'<button type="button" class="dp-acc-head" onclick="toggleAccordion(\''+id+'\')">'
    +'<span>'+title+'</span><span class="dp-acc-arrow">в–ј</span>'
    +'</button><div class="dp-acc-body">'+bodyHtml+'</div></div>';
}

function toggleAccordion(id){
  var el=document.getElementById('dp-acc-'+id);
  if(el) el.classList.toggle('open');
}

function showDetail(orgName){
  var org=mapOrgs.find(function(o){return o.name===orgName;});
  if(!org)return;
  selectedOrg=orgName;

  // кіөм§ҖмӮ¬н•ӯ лЎңл“ң нӣ„ нҢЁл„җ л ҢлҚ”
  fetchNotices(orgName).then(function(notices){
    renderDetailPanel(org,notices);
  });
}

function fetchNotices(orgName){
  if(noticeCache[orgName]) return Promise.resolve(noticeCache[orgName]);
  return fetch(GAS_URL+'?action=getPublicNoticesByOrg&orgName='+encodeURIComponent(orgName))
    .then(function(r){return r.json();})
    .then(function(d){noticeCache[orgName]=d||[];return noticeCache[orgName];})
    .catch(function(){return [];});
}

function renderDetailPanel(org,notices){
  var panel=document.getElementById('detail-panel');
  var isSchool=String(org.type||'').trim()==='н•ҷкөҗл°– лҠҳлҙ„';
  var icon=isSchool?'рҹ“ҡ':'рҹҸ ';
  var tl=isSchool?'н•ҷкөҗл°– лҠҳлҙ„ кё°кҙҖ':'м§Җм—ӯмӮ¬нҡҢ лҸҢлҙ„ кё°кҙҖ';

  // вҳ… н”„лЎңк·ёлһЁмқ„ org.programsм—җм„ң м§Ғм ‘ к°Җм ёмҳҙ
  var progs=org.programs||[];

  var h='<button class="dp-close" onclick="closeDetail()">вң•</button>';
  h+='<div class="dp-header"><div class="dp-name">'+icon+' '+esc(org.name)+'</div>';
  h+='<div class="dp-type"><span class="badge '+(isSchool?'badge-blue':'badge-green')+'">'+tl+'</span>'+(org.jurisdiction?' <span class="badge badge-orange">'+esc(org.jurisdiction)+'</span>':'')+'</div></div>';

  h+='<div class="dp-summary">';
  h+='<span class="badge badge-blue">рҹ“Ӣ н”„лЎңк·ёлһЁ '+progs.length+'к°ң</span>';
  if(org.openCount>0)h+='<span class="badge badge-green">рҹҹў лӘЁм§‘мӨ‘ '+org.openCount+'к°ң</span>';
  if(org.transport==='мһҲмқҢ')h+='<span class="badge badge-orange">рҹҡҢ нҶөн•ҷлІ„мҠӨ</span>';
  if(vp(org.routeMapUrl))h+='<span class="badge badge-green">рҹ—әпёҸ л…ём„ лҸ„</span>';
  h+='</div>';

  // л¬ёмқҳ м•ҲлӮҙ
  h+='<div class="dp-section"><div class="dp-section-title">рҹ“һ л¬ёмқҳ м•ҲлӮҙ</div><div class="dp-grid">';
  h+='<div class="dp-label">рҹ“һ лҢҖн‘ңм—°лқҪмІҳ</div><div class="dp-value">'+(vp(org.tel)||'<span class="dp-value pending">нҷ•мқё мӨ‘</span>')+'</div>';
  h+='<div class="dp-label">рҹ‘Ө лӢҙлӢ№мһҗ</div><div class="dp-value">'+(vp(org.managerName)||'<span class="dp-value pending">нҷ•мқё мӨ‘</span>')+'</div>';
  h+='<div class="dp-label">рҹ“ұ лӢҙлӢ№мһҗм—°лқҪмІҳ</div><div class="dp-value">'+(vp(org.managerTel)||'<span class="dp-value pending">нҷ•мқё мӨ‘</span>')+'</div>';
  h+='</div>';
  var contactNum=vp(org.managerTel)||vp(org.tel);
  if(contactNum){
    h+='<div class="dp-contact-btns">';
    h+='<button class="btn-contact call" onclick="handleCall(\''+esc(contactNum)+'\')">рҹ“һ м „нҷ”н•ҳкё°</button>';
    h+='<button class="btn-contact sms" onclick="handleSms(\''+esc(contactNum)+'\')">рҹ“ұ л¬ёмһҗн•ҳкё°</button>';
    h+='</div>';
  }
  h+='</div>';

  // кіөм§ҖмӮ¬н•ӯ м•„мҪ”л””м–ё
  var noticeHtml='';
  if(!notices||!notices.length) noticeHtml='<div class="dp-empty">л“ұлЎқлҗң кіөм§ҖмӮ¬н•ӯмқҙ м—ҶмҠөлӢҲлӢӨ.</div>';
  else notices.forEach(function(n){
    var isNew=false;
    try{var diff=Math.floor((new Date()-new Date(n.date))/86400000);isNew=diff>=0&&diff<=7;}catch(e){}
    noticeHtml+='<div class="notice-card"><div class="notice-title">'+esc(n.title)+(isNew?' <span class="badge badge-green">NEW</span>':'')+'</div><div class="notice-date">'+esc(n.date)+'</div>'+(n.content?'<div class="notice-content">'+esc(n.content)+'</div>':'')+'</div>';
  });
  h+=buildAccordion('notice','рҹ“ў кіөм§ҖмӮ¬н•ӯ',noticeHtml,true);

  // вҳ… н”„лЎңк·ёлһЁ м•„мҪ”л””м–ё - org.programs м§Ғм ‘ мӮ¬мҡ©
  var programHtml='';
  if(progs.length===0){
    programHtml='<div class="dp-empty">л“ұлЎқлҗң н”„лЎңк·ёлһЁмқҙ м—ҶмҠөлӢҲлӢӨ.</div>';
  }else{
    // н”„лЎңк·ёлһЁлӘ… кё°мӨҖ к·ёлЈ№н•‘ (к°ҷмқҖ мқҙлҰ„ лӢӨлҘё мҡ”мқј нҶөн•©)
    var grouped={};
    progs.forEach(function(p){
      var key=p.name||'мқҙлҰ„ лҜём •';
      if(!grouped[key])grouped[key]={info:p,schedules:[]};
      grouped[key].schedules.push({day:p.day,start:p.startTime,end:p.endTime});
    });
    for(var key in grouped){
      var g=grouped[key];var p=g.info;
      var stBadge=p.status==='лӘЁм§‘мӨ‘'?'badge-green':p.status==='л§Ҳк°җ'?'badge-red':p.status==='лҢҖкё°м ‘мҲҳ'?'badge-yellow':'badge-blue';
      programHtml+='<div class="dp-prog"><div class="dp-prog-name"><span>'+esc(key)+'</span>';
      if(p.status)programHtml+='<span class="badge '+stBadge+'">'+esc(p.status)+'</span>';
      programHtml+='</div>';
      if(vp(p.category))programHtml+='рҹ“Ӯ '+esc(p.category)+'<br>';
      g.schedules.forEach(function(s){
        programHtml+='рҹ“… '+esc(s.day||'мҡ”мқј лҜём •')+(s.start?' '+esc(s.start)+'~'+esc(s.end):'')+'<br>';
      });
      if(vp(p.grade))programHtml+='рҹҺ“ '+esc(p.grade)+'<br>';
      if(p.capacity){
        var cap=parseInt(p.capacity)||0,cur=parseInt(p.current)||0,rem=cap-cur;
        programHtml+='рҹ‘Ҙ '+cur+'/'+cap+'лӘ…';
        if(rem>0)programHtml+=' <span style="color:#00b894;font-weight:700;">(мһ”м—¬ '+rem+'лӘ…)</span>';
        programHtml+='<br>';
      }
      programHtml+='рҹ’° '+(vp(p.fee)||'нҷ•мқё мӨ‘');
      if(vp(p.description))programHtml+='<div style="margin-top:6px;color:var(--text-sub);font-size:0.8rem;">'+esc(p.description)+'</div>';
      programHtml+='</div>';
    }
  }
  h+=buildAccordion('program','рҹ“Ӣ н”„лЎңк·ёлһЁ ('+progs.length+'к°ң)',programHtml,true);

  // нҶөн•ҷ м•ҲлӮҙ м•„мҪ”л””м–ё
  var transportHtml='';
  if(org.transport==='мһҲмқҢ'){
    transportHtml='<div class="dp-transport yes">рҹҡҢ <strong>нҶөн•ҷлІ„мҠӨ мҡҙмҳҒ</strong><br>'+(vp(org.transportDetail)||'мғҒм„ё м •ліҙлҠ” кё°кҙҖм—җ л¬ёмқҳн•ҙмЈјм„ёмҡ”.')+'</div>';
    if(vp(org.routeMapUrl)){
      transportHtml+='<a class="btn-route" href="'+esc(org.routeMapUrl)+'" target="_blank" rel="noopener noreferrer">рҹ—әпёҸ нҶөн•ҷ л…ём„ лҸ„ ліҙкё°</a>';
      if(vp(org.routeMapNote)) transportHtml+='<div class="route-note">'+esc(org.routeMapNote)+'</div>';
    }
  }else{
    transportHtml='<div class="dp-transport no">рҹҡҢ нҶөн•ҷлІ„мҠӨ <strong>лҜёмҡҙмҳҒ</strong><br>вҖ» н•ҷл¶ҖлӘЁ м§Ғм ‘ л“ұВ·н•ҳмӣҗ н•„мҡ”</div>';
  }
  h+=buildAccordion('transport','рҹҡҢ нҶөн•ҷ м•ҲлӮҙ',transportHtml,false);

  // мҡҙмҳҒ м •ліҙ м•„мҪ”л””м–ё
  var infoHtml='<div class="dp-grid">';
  infoHtml+='<div class="dp-label">рҹ•җ мӢңк°„</div><div class="dp-value">'+(vp(org.hours)||'<span class="dp-value pending">нҷ•мқё мӨ‘</span>')+'</div>';
  infoHtml+='<div class="dp-label">рҹ“Қ мң„м№ҳ</div><div class="dp-value">'+(vp(org.address)||'<span class="dp-value pending">нҷ•мқё мӨ‘</span>');
  if(vp(org.address))infoHtml+=' <a href="https://map.naver.com/v5/search/'+encodeURIComponent(org.address)+'" target="_blank" style="font-size:0.75rem;color:#0984e3;">[л„ӨмқҙлІ„м§ҖлҸ„]</a>';
  infoHtml+='</div>';
  infoHtml+='<div class="dp-label">рҹ”— нҷҲнҺҳмқҙм§Җ</div><div class="dp-value">'+(vp(org.homepage)?'<a href="'+esc(org.homepage)+'" target="_blank">л°”лЎңк°Җкё°</a>':'<span class="dp-value pending">нҷ•мқё мӨ‘</span>')+'</div>';
  infoHtml+='</div>';
  h+=buildAccordion('info','рҹ•җ мҡҙмҳҒ м •ліҙ',infoHtml,false);

  // кё°кҙҖ мҶҢк°ң м•„мҪ”л””м–ё
  var introHtml=vp(org.intro)?'<div class="dp-prog" style="margin-bottom:0;">'+esc(org.intro)+'</div>':'<div class="dp-empty">кё°кҙҖ мҶҢк°ң м •ліҙк°Җ м•„м§Ғ м—ҶмҠөлӢҲлӢӨ.</div>';
  h+=buildAccordion('intro','рҹ’¬ кё°кҙҖ мҶҢк°ң',introHtml,false);

  panel.innerHTML=h;
  panel.className='detail-panel show';
  panel.scrollIntoView({behavior:'smooth',block:'start'});
  renderOrgList();
}

function closeDetail(){
  document.getElementById('detail-panel').className='detail-panel';
  selectedOrg=null;renderOrgList();
}

// ==========================================
// кё°кҙҖ лӘ©лЎқ
// ==========================================
function renderOrgList(){
  var filtered=getFiltered();
  var list=document.getElementById('org-list');
  var h='<div class="org-count">рҹ“Қ мҙқ '+filtered.length+'кіі</div>';

  filtered.forEach(function(o){
    var isSchool=String(o.type||'').trim()==='н•ҷкөҗл°– лҠҳлҙ„';
    var icon=isSchool?'рҹ“ҡ':'рҹҸ ';
    var tc=isSchool?'school':'community';
    var tb=isSchool?'badge-blue':'badge-green';
    var tl=isSchool?'н•ҷкөҗл°– лҠҳлҙ„':'м§Җм—ӯмӮ¬нҡҢ лҸҢлҙ„';
    var isSelected=selectedOrg===o.name;
    var pCount=(o.programs||[]).length;

    h+='<div class="org-card '+tc+(isSelected?' selected':'')+'" onclick="onOrgCardClick(\''+esc(o.name).replace(/'/g,"\\'")+'\')">';
    h+='<div class="org-name">'+icon+' '+esc(o.name)+'</div>';
    h+='<div class="org-info">'+(vp(o.address)||'<i style="color:var(--orange-deep);">мЈјмҶҢ нҷ•мқё мӨ‘</i>');
    h+=' В· н”„лЎңк·ёлһЁ '+pCount+'к°ң';
    if(o.openCount>0)h+=' В· <span style="color:var(--green-deep);font-weight:700;">лӘЁм§‘мӨ‘ '+o.openCount+'к°ң</span>';
    h+='</div>';
    h+='<div class="org-tags"><span class="badge '+tb+'">'+tl+'</span>';
    if(o.transport==='мһҲмқҢ')h+='<span class="badge badge-orange">рҹҡҢ нҶөн•ҷ</span>';
    h+='</div></div>';
  });

  if(!filtered.length)h='<div style="text-align:center;padding:30px;color:var(--text-sub);">л“ұлЎқлҗң кё°кҙҖмқҙ м—ҶмҠөлӢҲлӢӨ.</div>';
  list.innerHTML=h;
}

function onOrgCardClick(name){
  var found=allMarkers.find(function(m){return m.org.name===name;});
  if(found){
    kakaoMap.setCenter(found.marker.getPosition());
    kakaoMap.setLevel(3);
    closeAllInfo();
    found.info.open(kakaoMap,found.marker);
    currentOpenInfo=found.info;
    window.scrollTo({top:0,behavior:'smooth'});
  }
  showDetail(name);
}

// ==========================================
// мң нӢёлҰ¬нӢ°
// ==========================================
function handleCall(num){
  var digits=String(num).replace(/[^0-9]/g,'');
  if(/Android|iPhone|iPad|Mobile/i.test(navigator.userAgent))window.location.href='tel:'+digits;
  else{navigator.clipboard.writeText(num);alert('рҹ“һ '+num+' ліөмӮ¬лҗҳм—ҲмҠөлӢҲлӢӨ!');}
}
function handleSms(num){
  var digits=String(num).replace(/[^0-9]/g,'');
  if(/Android|iPhone|iPad|Mobile/i.test(navigator.userAgent))window.location.href='sms:'+digits;
  else{navigator.clipboard.writeText(num);alert('рҹ“ұ '+num+' ліөмӮ¬лҗҳм—ҲмҠөлӢҲлӢӨ!');}
}
function vp(v){return(v&&String(v).trim()!=='')?String(v).trim():'';}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';}
</script>
